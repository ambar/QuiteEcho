name: Release
on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.2.1)"
        required: true

permissions:
  contents: write

env:
  TAG: ${{ inputs.tag || github.ref_name }}

jobs:
  release:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref_name }}
      - name: Select Xcode 26
        run: sudo xcode-select -s "$(ls -d /Applications/Xcode_26*.app | sort -V | tail -1)"
      - name: Install Metal Toolchain
        run: |
          xcodebuild -downloadComponent MetalToolchain
          if ! xcrun --find metal 2>/dev/null; then
            echo "Metal tools not in PATH after download, installing from DMG..."
            DMG=$(find /System/Library/AssetsV2/com_apple_MobileAsset_MetalToolchain -name '*.dmg' 2>/dev/null | head -1)
            if [ -n "$DMG" ]; then
              MNT=$(mktemp -d)
              hdiutil attach "$DMG" -mountpoint "$MNT" -nobrowse -quiet
              sudo installer -pkg "$MNT"/*.pkg -target /
              hdiutil detach "$MNT" -quiet
            else
              echo "::error::Metal Toolchain DMG not found"
              exit 1
            fi
          fi
          xcrun --find metal
          xcrun --find metallib
      - name: Cache SPM build
        uses: actions/cache@v4
        with:
          path: .build
          key: spm-release-${{ runner.os }}-${{ hashFiles('Package.resolved') }}
          restore-keys: spm-release-${{ runner.os }}-
      - name: Build DMG
        run: make dmg
      - name: Rename DMG with version
        run: mv dist/QuiteEcho.dmg "dist/QuiteEcho-${TAG#v}.dmg"
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$TAG" "dist/QuiteEcho-${TAG#v}.dmg" --generate-notes
