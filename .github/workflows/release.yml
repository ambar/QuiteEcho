name: Release
on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      build_only:
        description: "Only build, skip publishing release"
        type: boolean
        default: false

permissions:
  contents: write

env:
  TAG: ${{ github.ref_name }}

jobs:
  release:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Fetch tags
        run: git fetch --tags --force
      - name: Select Xcode 26
        run: |
          XCODE=$(ls -d /Applications/Xcode_26*.app 2>/dev/null | sort -V | tail -1)
          echo "Selected: $XCODE"
          sudo xcode-select -s "$XCODE"
      - name: Install Metal Toolchain
        run: |
          xcodebuild -downloadComponent MetalToolchain
          if ! xcrun --find metal 2>/dev/null; then
            echo "Metal tools not in PATH after download, installing from DMG..."
            DMG=$(find /System/Library/AssetsV2/com_apple_MobileAsset_MetalToolchain -name '*.dmg' 2>/dev/null | head -1)
            if [ -n "$DMG" ]; then
              MNT=$(mktemp -d)
              hdiutil attach "$DMG" -mountpoint "$MNT" -nobrowse -quiet
              sudo installer -pkg "$MNT"/*.pkg -target /
              hdiutil detach "$MNT" -quiet
            else
              echo "::error::Metal Toolchain DMG not found"
              exit 1
            fi
          fi
          xcrun --find metal
          METAL_DIR=$(dirname "$(xcrun --find metal)")
          ls "$METAL_DIR/metallib" || echo "::warning::metallib not adjacent to metal, build may still succeed"
      - name: Import signing certificate
        env:
          DEVELOPER_ID_CERT_BASE64: ${{ secrets.DEVELOPER_ID_CERT_BASE64 }}
          DEVELOPER_ID_CERT_PASSWORD: ${{ secrets.DEVELOPER_ID_CERT_PASSWORD }}
        run: |
          CERT_PATH="$RUNNER_TEMP/cert.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 32)"

          echo -n "$DEVELOPER_ID_CERT_BASE64" | base64 --decode > "$CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$DEVELOPER_ID_CERT_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: \
            -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db

          # Extract signing identity name
          IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" \
            | grep "Developer ID Application" | head -1 \
            | sed 's/.*"\(.*\)".*/\1/')
          echo "SIGN_IDENTITY=$IDENTITY" >> "$GITHUB_ENV"
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"
      - name: Cache SPM build
        uses: actions/cache@v4
        with:
          path: .build
          key: spm-release-${{ runner.os }}-${{ hashFiles('Package.resolved') }}
          restore-keys: spm-release-${{ runner.os }}-
      - name: Build DMG
        run: make dmg SIGN_IDENTITY="$SIGN_IDENTITY"
      - name: Notarize DMG
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          xcrun notarytool submit dist/QuiteEcho.dmg \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_ID_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait
          xcrun stapler staple dist/QuiteEcho.dmg
      - name: Rename DMG with version
        if: ${{ !inputs.build_only }}
        run: mv dist/QuiteEcho.dmg "dist/QuiteEcho-${TAG#v}.dmg"
      - name: Sign DMG for Sparkle
        if: ${{ !inputs.build_only }}
        env:
          SPARKLE_ED_PRIVATE_KEY: ${{ secrets.SPARKLE_ED_PRIVATE_KEY }}
        run: |
          DMG_FILE="dist/QuiteEcho-${TAG#v}.dmg"
          SPARKLE_BIN=$(find .build -name "sign_update" -type f 2>/dev/null | head -1)
          if [ -n "$SPARKLE_BIN" ] && [ -n "$SPARKLE_ED_PRIVATE_KEY" ]; then
            chmod +x "$SPARKLE_BIN"
            SIGN_OUTPUT=$("$SPARKLE_BIN" "$DMG_FILE" --ed-key-file <(echo "$SPARKLE_ED_PRIVATE_KEY"))
            echo "SPARKLE_SIGNATURE=$SIGN_OUTPUT" >> "$GITHUB_ENV"
            echo "Sparkle signature: $SIGN_OUTPUT"
          else
            echo "::warning::sign_update not found or SPARKLE_ED_PRIVATE_KEY not set, skipping Sparkle signing"
          fi
      - name: Build release body
        if: ${{ !inputs.build_only }}
        run: |
          # Read annotated tag message (empty for lightweight tags)
          BODY=$(git for-each-ref --format='%(contents)' "refs/tags/$TAG" | sed '/^$/d')

          # Find previous release tag for Full Changelog link
          PREV_TAG=$(git tag -l "v*" --sort=-v:refname | grep -v beta | grep -v "^${TAG}$" | head -1)
          if [ -n "$PREV_TAG" ]; then
            REPO_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}"
            BODY="${BODY}

          **Full Changelog**: ${REPO_URL}/compare/${PREV_TAG}...${TAG}"
          fi

          # Write to file for gh release
          printf '%s\n' "$BODY" > /tmp/release-body.md
      - name: Create GitHub Release
        if: ${{ !inputs.build_only }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ARGS=("$TAG" "dist/QuiteEcho-${TAG#v}.dmg" --title "$TAG" --notes-file /tmp/release-body.md)
          # Mark beta tags as pre-release
          if [[ "$TAG" == *-beta* ]]; then
            ARGS+=(--prerelease)
          fi
          gh release create "${ARGS[@]}"
      - name: Update Sparkle appcast
        if: ${{ !inputs.build_only }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${TAG#v}"
          DMG_FILE="dist/QuiteEcho-${VERSION}.dmg"
          DMG_SIZE=$(stat -f%z "$DMG_FILE")
          DMG_URL="https://github.com/ambar/QuiteEcho/releases/download/${TAG}/QuiteEcho-${VERSION}.dmg"
          PUB_DATE=$(date -R)

          # Extract edSignature from SPARKLE_SIGNATURE (format: sparkle:edSignature="..." length="...")
          ED_SIG=""
          if [ -n "$SPARKLE_SIGNATURE" ]; then
            ED_SIG=$(echo "$SPARKLE_SIGNATURE" | sed -n 's/.*sparkle:edSignature="\([^"]*\)".*/\1/p')
          fi
          if [ -z "$ED_SIG" ]; then
            echo "::error::No Sparkle signature available, aborting appcast update"
            exit 1
          fi

          # Fetch release notes and convert markdown to HTML via GitHub API
          NOTES_MD=$(gh release view "$TAG" --json body -q .body 2>/dev/null || echo "")
          NOTES=""
          if [ -n "$NOTES_MD" ]; then
            NOTES=$(jq -n --arg text "$NOTES_MD" '{"text":$text,"mode":"gfm"}' | gh api --method POST /markdown --input - 2>/dev/null || echo "")
          fi

          # Build new appcast item (beta tags get sparkle:channel)
          CHANNEL=""
          if [[ "$TAG" == *-beta* ]]; then
            CHANNEL="
              <sparkle:channel>beta</sparkle:channel>"
          fi
          ITEM="        <item>
              <title>Version ${VERSION}</title>
              <sparkle:version>${VERSION}</sparkle:version>
              <sparkle:shortVersionString>${VERSION}</sparkle:shortVersionString>${CHANNEL}
              <pubDate>${PUB_DATE}</pubDate>
              <description><![CDATA[${NOTES}]]></description>
              <enclosure url=\"${DMG_URL}\"
                         sparkle:edSignature=\"${ED_SIG}\"
                         length=\"${DMG_SIZE}\"
                         type=\"application/octet-stream\"/>
          </item>"

          # Clone gh-pages, update appcast, push
          git fetch origin gh-pages || true
          if git rev-parse --verify origin/gh-pages >/dev/null 2>&1; then
            git worktree add /tmp/gh-pages origin/gh-pages
          else
            git worktree add --orphan /tmp/gh-pages
            cd /tmp/gh-pages && git checkout --orphan gh-pages && cd -
          fi

          APPCAST="/tmp/gh-pages/appcast.xml"
          if [ ! -f "$APPCAST" ]; then
            cat > "$APPCAST" << 'XMLEOF'
          <?xml version="1.0" encoding="utf-8"?>
          <rss version="2.0" xmlns:sparkle="http://www.andymatuschak.org/xml-namespaces/sparkle" xmlns:dc="http://purl.org/dc/elements/1.1/">
            <channel>
              <title>QuiteEcho</title>
            </channel>
          </rss>
          XMLEOF
          fi

          # Insert new item before </channel>
          printf '%s' "$ITEM" > /tmp/appcast_item.xml
          python3 -c "
          appcast = open('$APPCAST').read()
          item = open('/tmp/appcast_item.xml').read()
          appcast = appcast.replace('</channel>', item + '\n    </channel>')
          open('$APPCAST', 'w').write(appcast)
          "

          cd /tmp/gh-pages
          git add appcast.xml
          git commit -m "Update appcast for ${TAG}" || true
          git push origin gh-pages
          cd -
          git worktree remove /tmp/gh-pages
      - name: Clean up keychain
        if: always()
        run: |
          if [ -n "$KEYCHAIN_PATH" ]; then
            security delete-keychain "$KEYCHAIN_PATH" 2>/dev/null || true
          fi
