name: Release
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode 26
        run: sudo xcode-select -s "$(ls -d /Applications/Xcode_26*.app | sort -V | tail -1)"
      - name: Install Metal Toolchain
        run: xcodebuild -downloadComponent MetalToolchain
      - name: Build DMG
        run: make dmg
      - name: Rename DMG with version
        run: mv dist/QuiteEcho.dmg "dist/QuiteEcho-${GITHUB_REF_NAME#v}.dmg"
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${{ github.ref_name }}" "dist/QuiteEcho-${GITHUB_REF_NAME#v}.dmg" --generate-notes
