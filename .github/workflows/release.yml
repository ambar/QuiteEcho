name: Release
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - name: Build DMG
        run: make dmg UV_BIN=$(which uv)
      - name: Rename DMG with version
        run: mv dist/QuiteEcho.dmg "dist/QuiteEcho-${GITHUB_REF_NAME#v}.dmg"
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${{ github.ref_name }}" "dist/QuiteEcho-${GITHUB_REF_NAME#v}.dmg" --generate-notes
