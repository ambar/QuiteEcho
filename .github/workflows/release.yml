name: Release
on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      build_only:
        description: "Only build, skip publishing release"
        type: boolean
        default: false

permissions:
  contents: write

env:
  TAG: ${{ github.ref_name }}

jobs:
  release:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Fetch tags
        run: git fetch --tags --force
      - name: Select Xcode 26
        run: |
          XCODE=$(ls -d /Applications/Xcode_26*.app 2>/dev/null | sort -V | tail -1)
          echo "Selected: $XCODE"
          sudo xcode-select -s "$XCODE"
      - name: Install Metal Toolchain
        run: |
          xcodebuild -downloadComponent MetalToolchain
          if ! xcrun --find metal 2>/dev/null; then
            echo "Metal tools not in PATH after download, installing from DMG..."
            DMG=$(find /System/Library/AssetsV2/com_apple_MobileAsset_MetalToolchain -name '*.dmg' 2>/dev/null | head -1)
            if [ -n "$DMG" ]; then
              MNT=$(mktemp -d)
              hdiutil attach "$DMG" -mountpoint "$MNT" -nobrowse -quiet
              sudo installer -pkg "$MNT"/*.pkg -target /
              hdiutil detach "$MNT" -quiet
            else
              echo "::error::Metal Toolchain DMG not found"
              exit 1
            fi
          fi
          xcrun --find metal
          METAL_DIR=$(dirname "$(xcrun --find metal)")
          ls "$METAL_DIR/metallib" || echo "::warning::metallib not adjacent to metal, build may still succeed"
      - name: Import signing certificate
        env:
          DEVELOPER_ID_CERT_BASE64: ${{ secrets.DEVELOPER_ID_CERT_BASE64 }}
          DEVELOPER_ID_CERT_PASSWORD: ${{ secrets.DEVELOPER_ID_CERT_PASSWORD }}
        run: |
          CERT_PATH="$RUNNER_TEMP/cert.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 32)"

          echo -n "$DEVELOPER_ID_CERT_BASE64" | base64 --decode > "$CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$DEVELOPER_ID_CERT_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: \
            -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db

          # Extract signing identity name
          IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" \
            | grep "Developer ID Application" | head -1 \
            | sed 's/.*"\(.*\)".*/\1/')
          echo "SIGN_IDENTITY=$IDENTITY" >> "$GITHUB_ENV"
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"
      - name: Cache SPM build
        uses: actions/cache@v4
        with:
          path: .build
          key: spm-release-${{ runner.os }}-${{ hashFiles('Package.resolved') }}
          restore-keys: spm-release-${{ runner.os }}-
      - name: Build DMG
        run: make dmg SIGN_IDENTITY="$SIGN_IDENTITY"
      - name: Notarize DMG
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          xcrun notarytool submit dist/QuiteEcho.dmg \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_ID_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait
          xcrun stapler staple dist/QuiteEcho.dmg
      - name: Rename DMG with version
        if: ${{ !inputs.build_only }}
        run: mv dist/QuiteEcho.dmg "dist/QuiteEcho-${TAG#v}.dmg"
      - name: Build release body
        if: ${{ !inputs.build_only }}
        run: |
          # Read annotated tag message (empty for lightweight tags)
          BODY=$(git for-each-ref --format='%(contents)' "refs/tags/$TAG" | sed '/^$/d')

          # Find previous release tag for Full Changelog link
          PREV_TAG=$(git tag -l "v*" --sort=-v:refname | grep -v beta | grep -v "^${TAG}$" | head -1)
          if [ -n "$PREV_TAG" ]; then
            REPO_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}"
            BODY="${BODY}

          **Full Changelog**: ${REPO_URL}/compare/${PREV_TAG}...${TAG}"
          fi

          # Write to file for gh release
          printf '%s\n' "$BODY" > /tmp/release-body.md
      - name: Create GitHub Release
        if: ${{ !inputs.build_only }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ARGS=("$TAG" "dist/QuiteEcho-${TAG#v}.dmg" --title "$TAG" --notes-file /tmp/release-body.md)
          # Mark beta tags as pre-release
          if [[ "$TAG" == *-beta* ]]; then
            ARGS+=(--prerelease)
          fi
          gh release create "${ARGS[@]}"
      - name: Clean up keychain
        if: always()
        run: |
          if [ -n "$KEYCHAIN_PATH" ]; then
            security delete-keychain "$KEYCHAIN_PATH" 2>/dev/null || true
          fi
